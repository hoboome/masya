<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💗 Для Маси</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe4f0 0%, #ffd6e8 40%, #ffcce3 100%);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    /* floating hearts bg */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      bottom: -40px;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-110vh) rotate(10deg); opacity: 0; }
    }

    /* button screen */
    #intro {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    #intro.hidden {
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }

    .title-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #d4608a;
      letter-spacing: 0.04em;
      text-align: center;
      text-shadow: 0 1px 3px rgba(212,96,138,0.15);
    }

    .btn {
      padding: 18px 52px;
      background: linear-gradient(135deg, #f77db8, #e85da0);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(232,93,160,0.4), 0 2px 6px rgba(232,93,160,0.25);
      letter-spacing: 0.02em;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
    }
    .btn::after {
      content: ' 💗';
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 10px 30px rgba(232,93,160,0.5);
    }
    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* reveal section */
    #reveal {
      position: absolute;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      padding: 20px;
    }
    #reveal.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* layout: bubble left, photo right */
    .content-row {
      display: flex;
      align-items: flex-end;
      gap: 0;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* speech bubble */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      margin-bottom: 10px;
    }
    .bubble {
      background: #fff;
      border: 2.5px solid #f4a8cc;
      border-radius: 24px 24px 4px 24px;
      padding: 18px 22px;
      max-width: 260px;
      text-align: center;
      box-shadow: 0 4px 18px rgba(244,168,204,0.3);
      position: relative;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -18px;
      right: 20px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 18px solid #fff;
      filter: drop-shadow(0 2px 1px rgba(244,168,204,0.2));
    }
    .bubble::before {
      content: '';
      position: absolute;
      bottom: -21px;
      right: 19px;
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 20px solid #f4a8cc;
    }
    .bubble-text {
      font-size: 1rem;
      font-weight: 700;
      color: #c2547e;
      line-height: 1.5;
    }
    .bubble-days {
      font-size: 2rem;
      font-weight: 900;
      color: #e85da0;
      display: block;
      margin: 4px 0 2px;
    }

    /* photo */
    .photo-wrap {
      margin-top: 18px;
    }
    .photo-wrap img {
      width: 240px;
      max-width: 90vw;
      border-radius: 24px;
      border: 4px solid #f4a8cc;
      box-shadow: 0 8px 32px rgba(232,93,160,0.25), 0 2px 8px rgba(244,168,204,0.3);
      display: block;
    }

    /* bottom deco */
    .deco {
      margin-top: 22px;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
      color: #e85da0;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- floating hearts -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- intro -->
  <div id="intro">
    <p class="title-text">Нажми на кнопку ✨</p>
    <button class="btn" onclick="reveal()">нажми</button>
  </div>

  <!-- reveal -->
  <div id="reveal">
    <div class="content-row">
      <div class="bubble-wrap">
        <div class="bubble">
          <p class="bubble-text">
            сегодня<br>
            <span class="bubble-days" id="daysCount">…</span>
            день как я люблю Масю 💕
          </p>
        </div>
      </div>
      <div class="photo-wrap">
        <img src="250525__JOHNNY____BUBBLE_UPDATE.jpg" alt="Фото" />
      </div>
    </div>
    <div class="deco">✿ ♡ ✿ ♡ ✿</div>
  </div>

  <script>
    // calculate days since Oct 18 2022
    function getDays() {
      const start = new Date(2022, 9, 18); // month is 0-indexed
      const now = new Date();
      const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      return diff;
    }

    function reveal() {
      document.getElementById('daysCount').textContent = getDays();
      document.getElementById('intro').classList.add('hidden');
      setTimeout(() => {
        document.getElementById('reveal').classList.add('visible');
      }, 400);
    }

    // spawn floating hearts
    const heartChars = ['💗','💕','🌸','💖','✿','💓','🌷'];
    const bg = document.getElementById('heartsBg');
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'heart-float';
      h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
      h.style.left = Math.random() * 100 + '%';
      h.style.fontSize = (1 + Math.random() * 1.4) + 'rem';
      const dur = 7 + Math.random() * 9;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay = (Math.random() * dur) + 's';
      bg.appendChild(h);
    }
  </script>
</body>
</html>
